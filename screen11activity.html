<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VendorBridge – Activity & Logs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

:root {
--bg: #0b0d10;          
  --surface: #12161a;      
  --surface2: #1c2229;    
  --input-bg: #080a0c;    
  --border: #222b35;       
  --accent: #714b67;       
  --accent2: #4e2b63;      
  --accent-dim: rgba(113, 75, 103, 0.15);
  --text: #f1f5f9;         
  --muted: #64748b;      
  --nav-active: #1e2631;   
  --danger: #ef4444;      
  --warning: #f59e0b;      
  --step-done: #10b981;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.15rem;
  letter-spacing: -0.5px;
  padding: 22px 20px 18px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}

.logo span { color: var(--accent); }

nav { padding: 14px 0; flex: 1; }

nav a {
  display: block;
  padding: 10px 20px;
  font-size: 0.82rem;
  color: var(--muted);
  text-decoration: none;
  letter-spacing: 0.3px;
  transition: color 0.15s, background 0.15s;
  border-left: 3px solid transparent;
  position: relative;
}

nav a:hover { color: var(--text); background: var(--surface2); }

nav a.active {
  color: var(--success);
  background: rgba(16,185,129,0.07);
  border-left: 3px solid var(--success);
  font-weight: 500;
}

nav a::before { content: '– '; }

/* ── MAIN ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.topbar-search {
  flex: 1;
  max-width: 320px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 12px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  outline: none;
  transition: border-color 0.2s;
}

.topbar-search:focus { border-color: var(--accent); }

.topbar-right { display: flex; align-items: center; gap: 10px; }

.badge {
  font-size: 0.7rem;
  padding: 4px 10px;
  border-radius: 4px;
  font-family: 'Syne', sans-serif;
}

.badge-teal  { background: var(--accent2); color: #fff; }
.badge-purple { background: var(--accent); color: #fff; }
.badge-green  { background: var(--success); color: #0b0d10; }

.avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; font-weight: 700;
}

/* ── CONTENT ── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 32px 36px;
}

.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

h1 {
  font-family: 'Syne', sans-serif;
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}

.subtitle {
  font-size: 0.78rem;
  color: var(--muted);
  margin-bottom: 28px;
}

/* ── FILTER TABS ── */
.filter-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.tab-btn {
  padding: 7px 18px;
  border-radius: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  transition: all 0.18s;
  letter-spacing: 0.2px;
}

.tab-btn:hover { color: var(--text); border-color: var(--muted); background: var(--surface2); }

.tab-btn.active {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #fff;
  font-weight: 500;
}

/* ── TIMELINE ── */
.timeline {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.log-item {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
  animation: fadeIn 0.3s ease both;
  cursor: pointer;
  transition: background 0.15s;
  border-radius: 4px;
  padding-left: 4px;
}

.log-item:last-child { border-bottom: none; }
.log-item:hover { background: rgba(255,255,255,0.02); }

/* ── STATUS ICON ── */
.log-icon {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 1rem;
  margin-top: 2px;
  transition: transform 0.2s;
}

.log-item:hover .log-icon { transform: scale(1.08); }

.log-icon.done {
  border-color: var(--success);
  color: var(--success);
  background: rgba(16,185,129,0.08);
}

.log-icon.pending {
  border-color: var(--accent2);
  color: var(--accent2);
  background: rgba(1,126,132,0.08);
}

.log-icon.sent {
  border-color: var(--muted);
  color: var(--muted);
  background: rgba(100,116,139,0.08);
}

.log-icon.added {
  border-color: var(--muted);
  color: var(--muted);
  background: rgba(100,116,139,0.06);
}

/* ── LOG TEXT ── */
.log-body { flex: 1; }

.log-title {
  font-size: 0.85rem;
  color: var(--text);
  line-height: 1.45;
  margin-bottom: 4px;
  font-weight: 500;
}

.log-title strong {
  color: var(--accent2);
  font-weight: 500;
}

.log-meta {
  font-size: 0.72rem;
  color: var(--muted);
}

.log-tag {
  display: inline-block;
  font-size: 0.65rem;
  padding: 2px 7px;
  border-radius: 3px;
  margin-left: 8px;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  letter-spacing: 0.3px;
  vertical-align: middle;
}

.tag-rfq       { background: rgba(1,126,132,0.15); color: var(--accent2); border: 1px solid rgba(1,126,132,0.25); }
.tag-approval  { background: rgba(245,158,11,0.12); color: var(--warning); border: 1px solid rgba(245,158,11,0.25); }
.tag-invoice   { background: rgba(113,75,103,0.15); color: #b87fa8; border: 1px solid rgba(113,75,103,0.25); }
.tag-vendor    { background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.25); }
.tag-quotation { background: rgba(99,102,241,0.12); color: #818cf8; border: 1px solid rgba(99,102,241,0.25); }

/* ── ADD LOG FORM ── */
.add-log-bar {
  display: flex;
  gap: 10px;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.add-log-bar input {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 9px 14px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  outline: none;
  transition: border-color 0.2s;
}

.add-log-bar input:focus { border-color: var(--accent2); }

.add-log-bar select {
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 9px 12px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  outline: none;
  cursor: pointer;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  border-radius: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.18s;
  font-weight: 500;
}

.btn-primary {
  background: var(--accent2);
  color: #fff;
  border-color: var(--accent2);
}

.btn-primary:hover {
  background: #019ba2;
  box-shadow: 0 0 16px rgba(1,126,132,0.3);
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px; right: 28px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent2);
  padding: 12px 18px;
  border-radius: 7px;
  font-size: 0.8rem;
  color: var(--text);
  opacity: 0;
  transform: translateY(10px);
  pointer-events: none;
  transition: all 0.25s;
  z-index: 99;
}

.toast.show { opacity: 1; transform: translateY(0); }

@keyframes fadeIn {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 4px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">Vendor<span>Bridge</span></div>
  <nav>
    <a href="screen3dashboard.html">Dashboard</a>
    <a href="screen4vendors.html">Vendors</a>
    <a href="screen5rfq.html">RFQ's</a>
    <a href="screen6quotation1.html">Quotations</a>
    <a href="screen8approvalworkflow.html">Approvals</a>
    <a href="screen9invoices.html">Invoices</a>
    <a href="screen10reports.html">Reports</a>
    <a href="screen11activity.html" class="active">Activity</a>
  </nav>
</aside>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <input class="topbar-search" type="text" placeholder="Search logs…" oninput="searchLogs(this.value)">
    <div class="topbar-right">
      <span class="badge badge-teal">Courteous Moose</span>
      <span class="badge badge-green">Stunning Rabbit</span>
      <span class="badge badge-purple">Vibrant Chinchilla</span>
      <div class="avatar" style="background:var(--accent2);color:#fff;">I</div>
      <div class="avatar" style="background:#f97316;color:#fff;">P</div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <h1>Activity &amp; Logs</h1>
    <p class="subtitle">Procurement audit trail</p>

    <!-- FILTER TABS -->
    <div class="filter-tabs">
      <button class="tab-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
      <button class="tab-btn" data-filter="rfq" onclick="setFilter('rfq', this)">RFQ</button>
      <button class="tab-btn" data-filter="approval" onclick="setFilter('approval', this)">Approvals</button>
      <button class="tab-btn" data-filter="invoice" onclick="setFilter('invoice', this)">Invoices</button>
      <button class="tab-btn" data-filter="vendor" onclick="setFilter('vendor', this)">Vendors</button>
    </div>

    <!-- TIMELINE -->
    <div class="timeline" id="timeline"></div>

    <!-- ADD LOG -->
    <div class="add-log-bar">
      <input type="text" id="log-input" placeholder="Add a manual log entry…" onkeydown="if(event.key==='Enter')addLog()">
      <select id="log-type">
        <option value="rfq">RFQ</option>
        <option value="approval">Approval</option>
        <option value="invoice">Invoice</option>
        <option value="vendor">Vendor</option>
        <option value="quotation">Quotation</option>
      </select>
      <button class="btn btn-primary" onclick="addLog()">+ Add Log</button>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const logs = [
    {
      id: 1,
      type: 'quotation',
      status: 'done',
      icon: '✓',
      title: 'Quotation selected – <strong>Infra Supplies Pvt Ltd</strong> selected for Office Furniture Q2',
      date: '23 May 2025, 9:15 PM'
    },
    {
      id: 2,
      type: 'approval',
      status: 'pending',
      icon: '⏱',
      title: 'Approval pending – PO-2025 awaiting L2 approval by <strong>Khush Shah</strong>',
      date: '22 May 2025, 09:15 AM'
    },
    {
      id: 3,
      type: 'rfq',
      status: 'sent',
      icon: '□',
      title: 'RFQ published – Office Furniture Q2 sent to <strong>3 vendors</strong>',
      date: '14 May 2025'
    },
    {
      id: 4,
      type: 'vendor',
      status: 'added',
      icon: '□',
      title: 'Vendor added – <strong>FastLog Transport</strong> registered and pending verification',
      date: '13 May 2025, 3:20 PM'
    }
  ];

  const tagMap = {
    rfq:       '<span class="log-tag tag-rfq">RFQ</span>',
    approval:  '<span class="log-tag tag-approval">Approval</span>',
    invoice:   '<span class="log-tag tag-invoice">Invoice</span>',
    vendor:    '<span class="log-tag tag-vendor">Vendor</span>',
    quotation: '<span class="log-tag tag-quotation">Quotation</span>'
  };

  let activeFilter = 'all';
  let searchQuery  = '';

  function render() {
    const tl = document.getElementById('timeline');
    tl.innerHTML = '';

    const filtered = logs.filter(l => {
      const matchFilter = activeFilter === 'all' || l.type === activeFilter;
      const matchSearch = !searchQuery || l.title.toLowerCase().replace(/<[^>]+>/g,'').includes(searchQuery.toLowerCase()) || l.date.toLowerCase().includes(searchQuery.toLowerCase());
      return matchFilter && matchSearch;
    });

    if (!filtered.length) {
      tl.innerHTML = '<p style="color:var(--muted);font-size:0.8rem;padding:20px 0;">No log entries found.</p>';
      return;
    }

    filtered.forEach((l, i) => {
      const div = document.createElement('div');
      div.className = 'log-item';
      div.style.animationDelay = (i * 0.06) + 's';
      div.innerHTML = `
        <div class="log-icon ${l.status}">${l.icon}</div>
        <div class="log-body">
          <div class="log-title">${l.title}${tagMap[l.type] || ''}</div>
          <div class="log-meta">${l.date}</div>
        </div>`;
      tl.appendChild(div);
    });
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function searchLogs(q) {
    searchQuery = q;
    render();
  }

  function addLog() {
    const input = document.getElementById('log-input');
    const type  = document.getElementById('log-type').value;
    const text  = input.value.trim();
    if (!text) return;

    const now = new Date();
    const date = now.toLocaleString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

    logs.unshift({
      id: Date.now(),
      type,
      status: 'sent',
      icon: '+',
      title: text,
      date
    });

    input.value = '';
    render();
    showToast('Log entry added.');
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  render();
</script>
</body>
</html>
